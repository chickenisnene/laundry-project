<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지스트 스마트 세탁 시스템</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="mobile-container">
    <div id="login-page">
        <h1 style="text-align: center;  margin-bottom: 200px; width: 100%; height: 75px; line-height: 75px;">기숙사 세탁 시스템</h1>
        <input type="text" id="in-id" class="login-input" placeholder="학번 (예: 20261234)" >
        <input type="text" id="in-name" class="login-input" placeholder="이름">
        <input type="tel" id="in-phone" class="login-input" maxlength="11" placeholder="전화번호 (01012345678)">
        <div class="gender-select">
            <div id="g-male" class="gender-btn selected" onclick="selectGender('male')">남성</div>
            <div id="g-female" class="gender-btn" onclick="selectGender('female')">여성</div>
        </div>
        <button class="login-submit" onclick="handleLogin()">시작하기</button>
    </div>

    <nav class="tab-nav" id="main-nav">
        <ul sytle="background-color: #0ab5c4;">
            <li id="tab-map" class="tab-btn" onclick="switchTab('map-page', this)"style=" background-image: url('./reallogo.png'); background-size: contain; background-repeat: no-repeat; background-position: center;">세탁실지도</li>
            <li id="tab-status" class="tab-btn" onclick="switchTab('status-page', this)"style=" background-image: url('./reallogo.png'); background-size: contain; background-repeat: no-repeat; background-position: center;">상태 목록</li>
            <li id="tab-my" class="tab-btn active" onclick="switchTab('my-page', this)" style=" background-image: url('./reallogo.png'); background-size: contain; background-repeat: no-repeat; background-position: center;">마이페이지</li>
        </ul>
        </nav>

    <div id="my-page" class="page active-page">
        <div style="background: none; border-radius: 12px; font-size: 18px; margin-bottom: 5px; color:  white">
            <strong><span id="out-name"></span></strong>님, 환영합니다.
        </div>
        
        <div class="section-title">현재 사용 중인 기기</div>
        <div id="usage-list">
            <div style="border: 1px dashed white; padding: 15px; border-radius: 12px; text-align: center; color: black; font-size: 13px; background-color: white; color: black">등록된 기기가 없습니다.</div>
        </div>

        <div class="section-title">사용 기기 현황 (전체)</div>
        <div class="status-grid">
            <div class="status-box">
                <div class="status-box-title">구관 세탁기</div>
                <div id="count-old-wash" class="status-count"></div>
                <label class="switch"><input type="checkbox" onchange="toggleAlert('구관 세탁기')"><span class="slider"></span></label>
            </div>
            <div class="status-box">
                <div class="status-box-title">구관 건조기</div>
                <div id="count-old-dry" class="status-count"></div>
                <label class="switch"><input type="checkbox" onchange="toggleAlert('구관 건조기')"><span class="slider"></span></label>
            </div>
            <div class="status-box">
                <div class="status-box-title">신관 세탁기</div>
                <div id="count-new-wash" class="status-count"></div>
                <label class="switch"><input type="checkbox" onchange="toggleAlert('신관 세탁기')"><span class="slider"></span></label>
            </div>
            <div class="status-box">
                <div class="status-box-title">신관 건조기</div>
                <div id="count-new-dry" class="status-count"></div>
                <label class="switch"><input type="checkbox" onchange="toggleAlert('신관 건조기')"><span class="slider"></span></label>
            </div>
        </div>
    </div>

    <div id="status-page" class="page">
        <div class="dorm-switcher">
            <div class="dorm-switch-bg" id="bg-status"></div>
            <button class="dorm-btn active" onclick="changeDorm('new', this, 'bg-status')">신관</button>
            <button class="dorm-btn" onclick="changeDorm('old', this, 'bg-status')">구관</button>
        </div>
        <div class="machine-switcher">
            <div class="machine-switch-bg" id="bg-machine"></div>
            <button class="machine-type-btn active" onclick="switchMachinetype('wash', this, 'bg-machine')">세탁기</button>
            <button class="machine-type-btn" onclick="switchMachinetype('dry', this, 'bg-machine')">건조기</button>
        </div>
        
        <div class="timeline-header">
            <div style="text-align: right; font-size: 15px;">| 2h</div>
            <div class="timeline-marker">1h</div>
            <div class="timeline-marker">Now |</div>
        </div>

        <div id="status-container" style="position: relative;">
            <div class="left-line"></div>
            <div class="middle-line"></div>
            <div class="right-line"></div>
            <div id="status-list"></div>
        </div>
       
        
    </div>






    <div id="map-page" class="page">
        <div class="dorm-switcher">
            <div class="dorm-switch-bg" id="bg-map"></div>
            <button class="dorm-btn active" onclick="changeDorm('new', this, 'bg-map')">신관</button>
            <button class="dorm-btn" onclick="changeDorm('old', this, 'bg-map')">구관</button>
        </div>
        <div class="map-container"><img id="laundry-map-img" src="" alt="지도 로딩중..." class="map-image"></div>
    </div>

    <div id="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 id="modal-title" style="margin-top:0;"></h3>
            <p id="modal-info" style="color:#666; font-size:14px;"></p>
            <button id="btn-reg-usage" class="modal-btn">사용 중인 기기로 등록</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
